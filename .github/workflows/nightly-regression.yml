name: Nightly Regression

on:
  schedule:
    # 03:00 UTC every night
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  nightly-golden-regression:
    name: "Nightly Golden Dataset Regression (full gpt-4o)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run Golden Dataset regression (full gpt-4o judge)
        env:
          PYTHONPATH: src
          REDTHREAD_OPENAI_API_KEY: ${{ secrets.REDTHREAD_OPENAI_API_KEY }}
          # Full GPT-4o for production-grade nightly validation
          REDTHREAD_JUDGE_MODEL: gpt-4o
        run: |
          pytest tests/test_golden_dataset.py \
            -v \
            --tb=long

      - name: Create GitHub Issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔴 Nightly Regression Failed — ${new Date().toISOString().split('T')[0]}`,
              body: `The nightly Golden Dataset regression failed.\n\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              labels: ['regression', 'automated'],
            });
