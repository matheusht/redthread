name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: "Quality Gate (Ruff + Mypy)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src/

      - name: Mypy type check
        run: mypy src/redthread/

  unit-tests:
    name: "Unit Tests"
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests (no API calls)
        env:
          PYTHONPATH: src
          REDTHREAD_DRY_RUN: "true"
        run: |
          pytest tests/ \
            --ignore=tests/test_golden_dataset.py \
            -v \
            --tb=short

  golden-regression:
    name: "Golden Dataset Regression"
    runs-on: ubuntu-latest
    needs: unit-tests
    # Only run if OpenAI key is available (skip on forks)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run Golden Dataset regression
        env:
          PYTHONPATH: src
          REDTHREAD_OPENAI_API_KEY: ${{ secrets.REDTHREAD_OPENAI_API_KEY }}
          # Cost reduction: use gpt-4o-mini as judge for CI runs
          REDTHREAD_JUDGE_MODEL: gpt-4o-mini
        run: |
          pytest tests/test_golden_dataset.py \
            -v \
            --tb=short
